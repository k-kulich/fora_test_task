version: '3.8'

services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881/udp"
      - "50000-60000:50000-60000/udp"   # диапазон для медиа
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    environment:
      - LIVEKIT_API_KEY=devkey   # не обязательно, если есть в yaml
      - LIVEKIT_API_SECRET=secret

  backend:
    build: ./backend
    container_name: backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=secret
      - LIVEKIT_WS_URL=ws://livekit:7880
      - PUBLIC_URL=http://localhost:3000   # для ссылок, которые генерирует бэкенд
    depends_on:
      - livekit
    networks:
      - app-net

  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://backend:3000/api
      - VITE_WS_URL=ws://livekit:7880
    depends_on:
      - backend
    networks:
      - app-net

networks:
  app-net:
    driver: bridge